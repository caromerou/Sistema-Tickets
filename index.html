<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generation IT Support</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div id="loginSection" class="container mt-5" style="max-width: 400px;">
        <div class="card p-4 shadow-lg border-0 text-center">
            <h3><i class="fa-solid fa-headset text-primary"></i> Generation IT Support</h3>
            <input type="text" id="user" class="form-control mb-2" placeholder="Usuario">
            <input type="password" id="pass" class="form-control mb-2" placeholder="Contraseña">
            <button onclick="login()" class="btn btn-primary w-100">Entrar</button>
        </div>
    </div>

    <div id="appSection" style="display:none;">
        <nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
            <span class="navbar-brand fw-bold">IT Support Desk</span>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">Salir</button>
        </nav>

        <div class="container-fluid mt-4">
            <div class="d-flex justify-content-between mb-4 px-3">
                <h4>Dashboard de Tickets</h4>
                <button class="btn btn-primary" onclick="abrirModalNuevo()">+ Nuevo Ticket</button>
            </div>
            
            <div class="row px-3">
                <div class="col-md-4"><h6 class="text-center p-2 bg-secondary text-white rounded">Abierto</h6><div class="kanban-column" id="col-Abierto" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="col-md-4"><h6 class="text-center p-2 bg-secondary text-white rounded">En Proceso</h6><div class="kanban-column" id="col-EnProceso" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
                <div class="col-md-4"><h6 class="text-center p-2 bg-secondary text-white rounded">Cerrado</h6><div class="kanban-column" id="col-Cerrado" ondrop="drop(event)" ondragover="allowDrop(event)"></div></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTicket" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="modalTitle">Ticket</h5></div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <input type="text" id="cliente" class="form-control mb-2" placeholder="Cliente">
                    <input type="text" id="dispositivo" class="form-control mb-2" placeholder="Dispositivo">
                    <input type="text" id="titulo" class="form-control mb-2" placeholder="Asunto">
                    <textarea id="desc" class="form-control mb-2" placeholder="Descripción"></textarea>
                    <select id="prioridad" class="form-select"><option>Baja</option><option>Media</option><option>Alta</option></select>
                </div>
                <div class="modal-footer"><button class="btn btn-primary" onclick="guardarTicket()">Guardar</button></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white"><h5 class="modal-title">Detalle</h5></div>
                <div class="modal-body" id="modalDetalleBody"></div>
                <div class="modal-footer" id="modalDetalleFooter"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
